# docker-compose.yml — 一键启动命令：docker-compose up

services:
  # Nginx（门卫）：处理 HTTP 请求，转发给 Node.js
  nginx:
    image: nginx:alpine         # 直接用官方镜像，不用自己构建
    ports:
      - "80:80"                 # 用户通过 80 端口访问
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf  # 挂载配置文件
      - ./public:/usr/share/nginx/html                        # 静态文件
    depends_on:
      - app                     # 等 app 启动后再启动
    restart: unless-stopped

  # Node.js（后端）：处理 API 和 WebSocket
  app:
    build: .                    # 用当前目录的 Dockerfile 构建
    environment:
      - PORT=3000
      - NODE_ENV=production
      - JWT_SECRET=change-this-to-a-random-string
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data        # 数据持久化
    restart: unless-stopped
