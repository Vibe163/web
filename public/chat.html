<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聊天室</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #17212b; height: 100vh; display: flex; flex-direction: column; }

        /* 顶部导航 */
        .header {
            background: #1f2936;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #0e1621;
            min-height: 56px;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #6ab2f2, #4a9dea);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 18px; font-weight: bold;
        }
        .header-info h3 { color: #f5f5f5; font-size: 15px; font-weight: 600; }
        .header-info .status { color: #708499; font-size: 13px; }
        .header-info .status.online { color: #4dcd5e; }
        .header-right { display: flex; gap: 16px; }
        .header-btn { background: none; border: none; color: #708499; cursor: pointer; font-size: 20px; padding: 4px; }
        .header-btn:hover { color: #f5f5f5; }

        /* 消息区域 */
        .messages {
            flex: 1; overflow-y: auto; padding: 12px 16px;
            background: #0e1621;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2317212b' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #2b3a49; border-radius: 3px; }

        /* 日期分割 */
        .date-divider {
            text-align: center; margin: 16px 0;
            position: relative;
        }
        .date-divider span {
            background: #2b3a49; color: #708499;
            padding: 4px 12px; border-radius: 12px;
            font-size: 12px; position: relative; z-index: 1;
        }

        /* 消息气泡 */
        .message { margin: 4px 0; display: flex; }
        .message.other { justify-content: flex-start; }
        .message.mine { justify-content: flex-end; }

        .bubble {
            max-width: 70%; padding: 8px 12px;
            border-radius: 12px; position: relative;
            word-wrap: break-word;
        }
        .message.other .bubble {
            background: #182533; color: #f5f5f5;
            border-bottom-left-radius: 4px;
        }
        .message.mine .bubble {
            background: #2b5278; color: #f5f5f5;
            border-bottom-right-radius: 4px;
        }

        .bubble .name {
            font-size: 13px; font-weight: 600;
            margin-bottom: 4px;
        }
        .message.other .bubble .name { color: #6ab2f2; }
        .message.mine .bubble .name { color: #7ec8f8; }

        .bubble .text { font-size: 14px; line-height: 1.4; }
        .bubble .meta {
            display: flex; justify-content: flex-end;
            gap: 6px; margin-top: 4px;
        }
        .bubble .time { font-size: 11px; color: #708499; }
        .message.mine .bubble .time { color: #8db4d8; }

        /* 系统消息 */
        .system-message {
            text-align: center; margin: 8px 0;
        }
        .system-message span {
            background: rgba(43, 58, 73, 0.8); color: #708499;
            padding: 4px 12px; border-radius: 12px;
            font-size: 12px;
        }

        /* 输入区域 */
        .input-area {
            background: #17212b; padding: 10px 12px;
            border-top: 1px solid #0e1621;
            display: flex; align-items: flex-end; gap: 8px;
        }
        .input-wrapper {
            flex: 1; background: #242f3d;
            border-radius: 20px; padding: 8px 16px;
            display: flex; align-items: center;
        }
        .input-wrapper input {
            flex: 1; background: none; border: none;
            color: #f5f5f5; font-size: 15px; outline: none;
        }
        .input-wrapper input::placeholder { color: #6c7883; }

        .send-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: #2b5278; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .send-btn:hover { background: #3a6d9e; }
        .send-btn:active { background: #1e3a54; }
        .send-btn svg { fill: white; width: 20px; height: 20px; }

        /* 连接状态 */
        .connection-status {
            position: fixed; top: 70px; left: 50%;
            transform: translateX(-50%);
            background: #e53935; color: white;
            padding: 6px 16px; border-radius: 20px;
            font-size: 13px; z-index: 100;
            display: none;
        }
        .connection-status.show { display: block; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { height: 100vh; height: -webkit-fill-available; }
            .bubble { max-width: 85%; }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <div class="header-left">
            <div class="header-avatar">聊</div>
            <div class="header-info">
                <h3>实时聊天室</h3>
                <div class="status" id="statusText">连接中...</div>
            </div>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="clearMessages()" title="清空聊天">🗑️</button>
        </div>
    </div>

    <!-- 连接状态提示 -->
    <div class="connection-status" id="connectionStatus">连接断开，正在重连...</div>

    <!-- 消息区域 -->
    <div class="messages" id="messages"></div>

    <!-- 输入区域 -->
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="msgInput" placeholder="输入消息..." autocomplete="off">
        </div>
        <button class="send-btn" onclick="send()" id="sendBtn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <script>
        const messagesDiv = document.getElementById("messages");
        const msgInput = document.getElementById("msgInput");
        const statusText = document.getElementById("statusText");
        const connectionStatus = document.getElementById("connectionStatus");

        let ws = null;
        let myName = "";
        let reconnectTimer = null;
        let isConnected = false;

        // 请求通知权限
        if ("Notification" in window && Notification.permission === "default") {
            Notification.requestPermission();
        }

        // 格式化时间
        function formatTime(date) {
            const h = date.getHours().toString().padStart(2, '0');
            const m = date.getMinutes().toString().padStart(2, '0');
            return h + ':' + m;
        }

        // 获取今天日期
        function getToday() {
            return new Date().toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' });
        }

        // 显示日期分割
        function showDateDivider() {
            const div = document.createElement("div");
            div.className = "date-divider";
            div.innerHTML = '<span>' + getToday() + '</span>';
            messagesDiv.appendChild(div);
        }

        // 连接 WebSocket
        function connect() {
            const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(wsProtocol + "//" + window.location.host);

            ws.onopen = function() {
                isConnected = true;
                statusText.textContent = "在线";
                statusText.className = "status online";
                connectionStatus.classList.remove("show");
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
            };

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);

                if (data.type === "system") {
                    // 系统消息
                    const div = document.createElement("div");
                    div.className = "system-message";
                    div.innerHTML = '<span>' + data.text + '</span>';
                    messagesDiv.appendChild(div);

                    if (!myName && data.text.includes("加入了")) {
                        myName = data.text.replace(" 加入了聊天室", "");
                    }
                } else {
                    // 聊天消息
                    const isMine = (data.name === myName);
                    const div = document.createElement("div");
                    div.className = "message " + (isMine ? "mine" : "other");
                    div.innerHTML = '<div class="bubble">' +
                                   (isMine ? '' : '<div class="name">' + data.name + '</div>') +
                                   '<div class="text">' + escapeHtml(data.text) + '</div>' +
                                   '<div class="meta"><span class="time">' + formatTime(new Date()) + '</span></div>' +
                                   '</div>';
                    messagesDiv.appendChild(div);

                    // 别人发的消息，发送通知
                    if (!isMine) {
                        showNotification(data.name, data.text);
                    }
                }

                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            };

            ws.onclose = function() {
                isConnected = false;
                statusText.textContent = "离线";
                statusText.className = "status";
                connectionStatus.classList.add("show");
                reconnectTimer = setTimeout(connect, 2000);
            };

            ws.onerror = function() {
                ws.close();
            };
        }

        // 显示通知
        function showNotification(name, text) {
            if (document.hasFocus()) return;
            playBeep();
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(name, { body: text });
            }
        }

        // 播放提示音
        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 800;
                gainNode.gain.value = 0.3;
                oscillator.start();
                setTimeout(() => oscillator.stop(), 200);
            } catch (e) {}
        }

        // 发送消息
        function send() {
            const text = msgInput.value.trim();
            if (!text || !isConnected) return;
            ws.send(JSON.stringify({ text: text }));
            msgInput.value = "";
            msgInput.focus();
        }

        // 回车发送
        msgInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") send();
        });

        // 清空聊天
        function clearMessages() {
            if (confirm("确定清空聊天记录？")) {
                messagesDiv.innerHTML = "";
                showDateDivider();
            }
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始化
        showDateDivider();
        connect();
    </script>
</body>
</html>
