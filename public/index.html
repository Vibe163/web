<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聊天</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0e1621; height: 100vh; overflow: hidden; }

        /* 登录页面 */
        .auth-page {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #1a2a3a, #0e1621);
        }
        .auth-box {
            background: #17212b; border-radius: 12px; padding: 40px; width: 360px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .auth-box h2 { color: #f5f5f5; text-align: center; margin-bottom: 30px; font-size: 24px; }
        .auth-box input {
            width: 100%; padding: 12px 16px; margin-bottom: 16px;
            background: #242f3d; border: 2px solid transparent; border-radius: 8px;
            color: #f5f5f5; font-size: 15px; outline: none;
        }
        .auth-box input:focus { border-color: #2b5278; }
        .auth-box input::placeholder { color: #6c7883; }
        .auth-btn {
            width: 100%; padding: 12px; background: #2b5278; color: white;
            border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
            transition: background 0.2s; margin-bottom: 12px;
        }
        .auth-btn:hover { background: #3a6d9e; }
        .auth-switch { text-align: center; color: #6ab2f2; cursor: pointer; font-size: 14px; }
        .auth-switch:hover { text-decoration: underline; }
        .auth-error { color: #e53935; font-size: 13px; margin-bottom: 12px; display: none; }

        /* 主页面 */
        .main-page { display: none; height: 100vh; }

        /* 移动端：显示侧边栏或聊天 */
        @media (max-width: 768px) {
            .main-page.show-sidebar .sidebar { display: flex; }
            .main-page.show-sidebar .chat-area { display: none; }
            .main-page.show-chat .sidebar { display: none; }
            .main-page.show-chat .chat-area { display: flex; }
        }

        .container { display: flex; height: 100vh; }

        /* 侧边栏 */
        .sidebar {
            width: 320px; background: #17212b;
            border-right: 1px solid #0e1621;
            display: flex; flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 12px 16px; display: flex; align-items: center;
            justify-content: space-between; border-bottom: 1px solid #0e1621;
            min-height: 56px;
        }
        .sidebar-header h3 { color: #f5f5f5; font-size: 16px; }
        .sidebar-header button {
            background: none; border: none; color: #6ab2f2;
            cursor: pointer; font-size: 14px; padding: 6px 12px;
            border-radius: 6px;
        }
        .sidebar-header button:hover { background: #1f2936; }

        .search-box {
            padding: 8px 12px; border-bottom: 1px solid #0e1621;
        }
        .search-box input {
            width: 100%; padding: 10px 16px; background: #242f3d;
            border: none; border-radius: 20px; color: #f5f5f5;
            font-size: 14px; outline: none;
        }
        .search-box input::placeholder { color: #6c7883; }

        .friends-list {
            flex: 1; overflow-y: auto;
        }
        .friends-list::-webkit-scrollbar { width: 6px; }
        .friends-list::-webkit-scrollbar-thumb { background: #2b3a49; border-radius: 3px; }

        .friend-item {
            display: flex; align-items: center; padding: 12px 16px;
            cursor: pointer; transition: background 0.1s;
        }
        .friend-item:hover { background: #1f2936; }
        .friend-item.active { background: #2b5278; }

        .friend-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, #6ab2f2, #4a9dea);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 18px; font-weight: bold; flex-shrink: 0;
        }
        .friend-info { margin-left: 12px; flex: 1; min-width: 0; }
        .friend-info .name { color: #f5f5f5; font-size: 15px; font-weight: 500; }
        .friend-info .last-msg { color: #708499; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .friend-status { width: 10px; height: 10px; border-radius: 50%; margin-left: 8px; flex-shrink: 0; }
        .friend-status.online { background: #4dcd5e; }
        .friend-status.offline { background: #4a4a4a; }

        /* 添加好友弹窗 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: none;
            align-items: center; justify-content: center; z-index: 100;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #17212b; border-radius: 12px; padding: 24px;
            width: 360px; max-width: 90%;
        }
        .modal h3 { color: #f5f5f5; margin-bottom: 16px; }
        .modal input {
            width: 100%; padding: 10px 16px; background: #242f3d;
            border: none; border-radius: 8px; color: #f5f5f5;
            font-size: 14px; outline: none; margin-bottom: 12px;
        }
        .modal .search-results { max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
        .modal .search-result {
            display: flex; align-items: center; padding: 10px;
            cursor: pointer; border-radius: 8px;
        }
        .modal .search-result:hover { background: #242f3d; }
        .modal .search-result .name { color: #f5f5f5; flex: 1; }
        .modal .search-result .add-btn {
            background: #2b5278; color: white; border: none;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .modal .search-result .add-btn:hover { background: #3a6d9e; }
        .modal .close-btn {
            width: 100%; padding: 10px; background: #242f3d;
            color: #f5f5f5; border: none; border-radius: 8px;
            cursor: pointer; font-size: 14px;
        }
        .modal .close-btn:hover { background: #2b3a49; }

        /* 聊天区域 */
        .chat-area {
            flex: 1; display: none; flex-direction: column;
            background: #0e1621;
        }
        .chat-area.active { display: flex; }

        .chat-header {
            background: #17212b; padding: 12px 16px;
            display: flex; align-items: center;
            border-bottom: 1px solid #0e1621; min-height: 56px;
        }
        .chat-header .back-btn {
            display: none; background: none; border: none;
            color: #6ab2f2; cursor: pointer; font-size: 20px;
            margin-right: 12px;
        }
        @media (max-width: 768px) {
            .chat-header .back-btn { display: block; }
        }
        .chat-header .call-actions { margin-left: auto; display: flex; gap: 4px; }
        .chat-header .user-info { display: flex; align-items: center; flex: 1; }
        .chat-header .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #6ab2f2, #4a9dea);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 16px; font-weight: bold;
        }
        .chat-header .details { margin-left: 12px; }
        .chat-header .details .name { color: #f5f5f5; font-size: 15px; font-weight: 600; }
        .chat-header .details .status { color: #708499; font-size: 13px; }
        .chat-header .details .status.online { color: #4dcd5e; }

        /* 通话按钮 */
        .call-btn {
            background: none; border: none; color: #4dcd5e;
            cursor: pointer; font-size: 22px; padding: 8px;
            border-radius: 50%; transition: background 0.2s;
        }
        .call-btn:hover { background: #1f2936; }

        /* 通话界面 */
        .call-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 200;
        }
        .call-overlay.show { display: flex; }
        .call-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, #6ab2f2, #4a9dea);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 42px; font-weight: bold;
            margin-bottom: 20px;
        }
        .call-name { color: #f5f5f5; font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .call-status { color: #708499; font-size: 16px; margin-bottom: 40px; }
        .call-timer { color: #4dcd5e; font-size: 18px; margin-bottom: 40px; display: none; }
        .call-actions { display: flex; gap: 30px; }
        .call-action-btn {
            width: 64px; height: 64px; border-radius: 50%;
            border: none; cursor: pointer; font-size: 24px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s;
        }
        .call-action-btn:hover { transform: scale(1.1); }
        .call-action-btn.accept { background: #4dcd5e; color: white; }
        .call-action-btn.reject { background: #e53935; color: white; }
        .call-action-btn.mute { background: #242f3d; color: white; }
        .call-action-btn.mute.active { background: #e53935; }
        .call-action-btn.speaker { background: #242f3d; color: white; }
        .call-action-btn.speaker.active { background: #2b5278; }
        .call-action-btn.video { background: #242f3d; color: white; }
        .call-action-btn.video.active { background: #2b5278; }

        /* 视频通话 */
        .call-overlay.video-mode {
            background: #000;
        }
        .call-video-container {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: none;
        }
        .call-overlay.video-mode .call-video-container { display: block; }
        .call-overlay.video-mode .call-avatar,
        .call-overlay.video-mode .call-name,
        .call-overlay.video-mode .call-status,
        .call-overlay.video-mode .call-timer { z-index: 2; }
        #remoteVideo {
            width: 100%; height: 100%; object-fit: cover;
        }
        #localVideo {
            position: absolute; top: 16px; right: 16px;
            width: 120px; height: 160px; object-fit: cover;
            border-radius: 12px; border: 2px solid rgba(255,255,255,0.3);
            z-index: 10; background: #1a1a1a;
        }
        .video-call-info {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 60px; z-index: 5;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
            padding-bottom: 40px;
        }
        .video-call-actions {
            position: absolute; bottom: 40px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 20px; z-index: 10;
        }

        .chat-messages {
            flex: 1; overflow-y: auto; padding: 12px 16px;
        }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #2b3a49; border-radius: 3px; }

        .date-divider { text-align: center; margin: 16px 0; }
        .date-divider span {
            background: #2b3a49; color: #708499;
            padding: 4px 12px; border-radius: 12px; font-size: 12px;
        }

        .message { margin: 4px 0; display: flex; }
        .message.other { justify-content: flex-start; }
        .message.mine { justify-content: flex-end; }

        .bubble {
            max-width: 70%; padding: 8px 12px;
            border-radius: 12px; word-wrap: break-word;
        }
        .message.other .bubble {
            background: #182533; color: #f5f5f5;
            border-bottom-left-radius: 4px;
        }
        .message.mine .bubble {
            background: #2b5278; color: #f5f5f5;
            border-bottom-right-radius: 4px;
        }
        .bubble .text { font-size: 14px; line-height: 1.4; }
        .bubble .time { font-size: 11px; color: #708499; margin-top: 4px; text-align: right; }
        .message.mine .bubble .time { color: #8db4d8; }

        /* 输入区域 */
        .chat-input {
            background: #17212b; padding: 10px 12px;
            border-top: 1px solid #0e1621;
            display: flex; align-items: center; gap: 8px;
        }
        .chat-input .input-wrapper {
            flex: 1; background: #242f3d; border-radius: 20px;
            padding: 10px 16px;
        }
        .chat-input input {
            width: 100%; background: none; border: none;
            color: #f5f5f5; font-size: 15px; outline: none;
        }
        .chat-input input::placeholder { color: #6c7883; }
        .chat-input .send-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: #2b5278; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .chat-input .send-btn:hover { background: #3a6d9e; }
        .chat-input .send-btn svg { fill: white; width: 20px; height: 20px; }

        /* 空状态 */
        .empty-chat {
            flex: 1; display: flex; align-items: center; justify-content: center;
            color: #708499; font-size: 16px;
        }

        /* 个人中心 */
        .profile-page {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #0e1621; z-index: 150; display: none;
            flex-direction: column; overflow-y: auto;
        }
        .profile-page.show { display: flex; }
        .profile-header {
            background: #17212b; padding: 12px 16px;
            display: flex; align-items: center; min-height: 56px;
            border-bottom: 1px solid #0e1621;
        }
        .profile-header .back-btn {
            background: none; border: none; color: #6ab2f2;
            cursor: pointer; font-size: 20px; margin-right: 16px;
        }
        .profile-header h3 { color: #f5f5f5; font-size: 16px; }
        .profile-body { padding: 24px 16px; max-width: 480px; margin: 0 auto; width: 100%; }

        .profile-avatar-section {
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 32px;
        }
        .profile-avatar {
            width: 96px; height: 96px; border-radius: 50%;
            background: linear-gradient(135deg, #6ab2f2, #4a9dea);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 42px; font-weight: bold;
            margin-bottom: 12px; cursor: pointer; position: relative;
        }
        .profile-avatar:hover::after {
            content: "更换"; position: absolute; bottom: -4px; left: 50%;
            transform: translateX(-50%); background: rgba(0,0,0,0.7);
            color: white; font-size: 11px; padding: 2px 8px;
            border-radius: 8px; white-space: nowrap;
        }
        .profile-username { color: #f5f5f5; font-size: 20px; font-weight: 600; }
        .profile-id { color: #708499; font-size: 13px; margin-top: 4px; }

        .profile-stats {
            display: flex; justify-content: center; gap: 40px;
            margin-bottom: 32px; padding: 16px 0;
            border-top: 1px solid #1a2533; border-bottom: 1px solid #1a2533;
        }
        .stat-item { text-align: center; }
        .stat-num { color: #f5f5f5; font-size: 22px; font-weight: 600; }
        .stat-label { color: #708499; font-size: 12px; margin-top: 4px; }

        .profile-section { margin-bottom: 24px; }
        .profile-section-title {
            color: #6ab2f2; font-size: 13px; font-weight: 600;
            text-transform: uppercase; margin-bottom: 8px; padding-left: 4px;
        }
        .profile-item {
            display: flex; align-items: center; padding: 14px 16px;
            background: #17212b; border-radius: 10px; margin-bottom: 2px;
            cursor: pointer; transition: background 0.1s;
        }
        .profile-item:first-child { border-radius: 10px 10px 2px 2px; }
        .profile-item:last-child { border-radius: 2px 2px 10px 10px; margin-bottom: 0; }
        .profile-item:only-child { border-radius: 10px; }
        .profile-item:hover { background: #1f2936; }
        .profile-item .icon { font-size: 20px; margin-right: 14px; width: 24px; text-align: center; }
        .profile-item .label { color: #f5f5f5; font-size: 15px; flex: 1; }
        .profile-item .value { color: #708499; font-size: 14px; margin-right: 8px; }
        .profile-item .arrow { color: #4a5568; font-size: 16px; }

        .profile-item.danger { color: #e53935; }
        .profile-item.danger .label { color: #e53935; }

        /* 编辑弹窗 */
        .edit-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); display: none;
            align-items: center; justify-content: center; z-index: 160;
        }
        .edit-modal.show { display: flex; }
        .edit-modal .edit-box {
            background: #17212b; border-radius: 12px; padding: 24px;
            width: 360px; max-width: 90%;
        }
        .edit-modal h3 { color: #f5f5f5; margin-bottom: 16px; font-size: 17px; }
        .edit-modal input {
            width: 100%; padding: 12px 16px; background: #242f3d;
            border: 2px solid transparent; border-radius: 8px;
            color: #f5f5f5; font-size: 15px; outline: none; margin-bottom: 12px;
        }
        .edit-modal input:focus { border-color: #2b5278; }
        .edit-modal .edit-actions { display: flex; gap: 10px; }
        .edit-modal .edit-actions button {
            flex: 1; padding: 12px; border-radius: 8px;
            border: none; font-size: 15px; cursor: pointer;
        }
        .edit-modal .btn-cancel { background: #242f3d; color: #f5f5f5; }
        .edit-modal .btn-save { background: #2b5278; color: white; }
        .edit-modal .btn-save:hover { background: #3a6d9e; }
        .edit-modal .edit-error { color: #e53935; font-size: 13px; margin-bottom: 8px; display: none; }

        /* 头像选择器 */
        .emoji-picker {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
            max-height: 120px; overflow-y: auto;
        }
        .emoji-option {
            width: 44px; height: 44px; border-radius: 50%;
            background: #242f3d; display: flex; align-items: center;
            justify-content: center; font-size: 22px; cursor: pointer;
            border: 2px solid transparent; transition: all 0.15s;
        }
        .emoji-option:hover { background: #2b5278; }
        .emoji-option.selected { border-color: #6ab2f2; background: #2b5278; }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="auth-page" id="authPage">
        <div class="auth-box">
            <h2 id="authTitle">登录</h2>
            <div class="auth-error" id="authError"></div>
            <input type="text" id="authUsername" placeholder="用户名" autocomplete="off">
            <input type="password" id="authPassword" placeholder="密码">
            <button class="auth-btn" id="authBtn" onclick="handleAuth()">登录</button>
            <div class="auth-switch" id="authSwitch" onclick="toggleAuth()">没有账号？去注册</div>
        </div>
    </div>

    <!-- 主页面 -->
    <div class="main-page show-sidebar" id="mainPage">
        <div class="container">
            <!-- 侧边栏 -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <button onclick="showProfile()" style="font-size:18px;padding:6px 10px">☰</button>
                    <h3>聊天</h3>
                    <button onclick="showAddFriend()">+ 添加好友</button>
                </div>
                <div class="search-box">
                    <input type="text" placeholder="搜索好友..." id="searchFriend" oninput="filterFriends()">
                </div>
                <div class="friends-list" id="friendsList"></div>
            </div>

            <!-- 聊天区域 -->
            <div class="chat-area" id="chatArea">
                <div class="chat-header">
                    <button class="back-btn" onclick="goBack()">←</button>
                    <div class="user-info">
                        <div class="avatar" id="chatAvatar">?</div>
                        <div class="details">
                            <div class="name" id="chatName">选择一个好友开始聊天</div>
                            <div class="status" id="chatStatus"></div>
                        </div>
                    </div>
                    <div class="call-actions">
                        <button class="call-btn" id="callBtn" onclick="startCall(false)" title="语音通话">📞</button>
                        <button class="call-btn" id="videoCallBtn" onclick="startCall(true)" title="视频通话">📹</button>
                    </div>
                </div>
                <div class="empty-chat" id="emptyChat">选择一个好友开始聊天</div>
                <div class="chat-messages" id="chatMessages" style="display:none"></div>
                <div class="chat-input" id="chatInput" style="display:none">
                    <div class="input-wrapper">
                        <input type="text" id="msgInput" placeholder="输入消息..." autocomplete="off">
                    </div>
                    <button class="send-btn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加好友弹窗 -->
    <div class="modal-overlay" id="addFriendModal">
        <div class="modal">
            <h3>添加好友</h3>
            <input type="text" id="searchUserInput" placeholder="输入用户名搜索..." oninput="searchUsers()">
            <div class="search-results" id="searchResults"></div>
            <button class="close-btn" onclick="closeAddFriend()">关闭</button>
        </div>
    </div>

    <!-- 通话界面 -->
    <div class="call-overlay" id="callOverlay">
        <div class="call-video-container">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-call-info">
            <div class="call-avatar" id="callAvatar">?</div>
            <div class="call-name" id="callName">对方</div>
            <div class="call-status" id="callStatus">正在呼叫...</div>
            <div class="call-timer" id="callTimer">00:00</div>
        </div>
        <div class="call-actions video-call-actions">
            <button class="call-action-btn mute" id="muteBtn" onclick="toggleMute()">🎤</button>
            <button class="call-action-btn video" id="videoBtn" onclick="toggleVideo()">📹</button>
            <button class="call-action-btn reject" id="rejectBtn" onclick="endCall()">📞</button>
            <button class="call-action-btn accept" id="acceptBtn" onclick="acceptCall()" style="display:none">📞</button>
            <button class="call-action-btn speaker" id="speakerBtn" onclick="toggleSpeaker()">🔊</button>
        </div>
    </div>

    <!-- 个人中心 -->
    <div class="profile-page" id="profilePage">
        <div class="profile-header">
            <button class="back-btn" onclick="closeProfile()">←</button>
            <h3>个人中心</h3>
        </div>
        <div class="profile-body">
            <div class="profile-avatar-section">
                <div class="profile-avatar" id="profileAvatar" onclick="showEditAvatar()">?</div>
                <div class="profile-username" id="profileUsername">用户名</div>
                <div class="profile-id" id="profileId">ID: --</div>
            </div>
            <div class="profile-stats">
                <div class="stat-item">
                    <div class="stat-num" id="statFriends">0</div>
                    <div class="stat-label">好友</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num" id="statMessages">0</div>
                    <div class="stat-label">消息</div>
                </div>
            </div>
            <div class="profile-section">
                <div class="profile-section-title">账号</div>
                <div class="profile-item" onclick="showEditUsername()">
                    <div class="icon">👤</div>
                    <div class="label">用户名</div>
                    <div class="value" id="profileUsernameValue">--</div>
                    <div class="arrow">›</div>
                </div>
                <div class="profile-item" onclick="showEditPassword()">
                    <div class="icon">🔑</div>
                    <div class="label">修改密码</div>
                    <div class="arrow">›</div>
                </div>
            </div>
            <div class="profile-section">
                <div class="profile-item danger" onclick="logout()">
                    <div class="icon">🚪</div>
                    <div class="label">退出登录</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div class="edit-modal" id="editModal">
        <div class="edit-box">
            <h3 id="editTitle">编辑</h3>
            <div class="edit-error" id="editError"></div>
            <div id="editContent"></div>
            <div class="edit-actions">
                <button class="btn-cancel" onclick="closeEditModal()">取消</button>
                <button class="btn-save" id="editSaveBtn" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // 状态
        let currentUser = null;
        let currentFriend = null;
        let friends = [];
        let ws = null;
        let onlineUsers = new Set();
        let isLogin = true;

        // 带 JWT token 的请求工具
        async function authFetch(url, options) {
            if (!options) options = {};
            if (!options.headers) options.headers = {};
            if (currentUser && currentUser.token) {
                options.headers["Authorization"] = "Bearer " + currentUser.token;
            }
            if (options.body && typeof options.body === "object" && !(options.body instanceof FormData)) {
                options.headers["Content-Type"] = "application/json";
                options.body = JSON.stringify(options.body);
            }
            const res = await fetch(url, options);
            // 如果 token 过期，自动退出登录
            if (res.status === 401) {
                localStorage.removeItem("chatUser");
                location.reload();
                return;
            }
            return res;
        }

        // 初始化
        async function init() {
            const saved = localStorage.getItem("chatUser");
            if (saved) {
                currentUser = JSON.parse(saved);
                // 用 token 验证登录状态
                try {
                    const res = await authFetch("/api/auth/verify");
                    if (res && res.ok) {
                        const data = await res.json();
                        currentUser.username = data.username;
                        currentUser.avatar = data.avatar;
                        localStorage.setItem("chatUser", JSON.stringify(currentUser));
                        showMainPage();
                    } else {
                        localStorage.removeItem("chatUser");
                        currentUser = null;
                    }
                } catch (e) {
                    localStorage.removeItem("chatUser");
                    currentUser = null;
                }
            }
        }

        // 切换登录/注册
        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById("authTitle").textContent = isLogin ? "登录" : "注册";
            document.getElementById("authBtn").textContent = isLogin ? "登录" : "注册";
            document.getElementById("authSwitch").textContent = isLogin ? "没有账号？去注册" : "已有账号？去登录";
            document.getElementById("authError").style.display = "none";
        }

        // 处理登录/注册
        async function handleAuth() {
            const username = document.getElementById("authUsername").value.trim();
            const password = document.getElementById("authPassword").value.trim();
            const errorEl = document.getElementById("authError");

            if (!username || !password) {
                errorEl.textContent = "请输入用户名和密码";
                errorEl.style.display = "block";
                return;
            }

            try {
                const endpoint = isLogin ? "/api/auth/login" : "/api/auth/register";
                const res = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    errorEl.textContent = data.error;
                    errorEl.style.display = "block";
                    return;
                }

                currentUser = { id: data.id, username: data.username, avatar: data.avatar || "", token: data.token };
                localStorage.setItem("chatUser", JSON.stringify(currentUser));
                showMainPage();
            } catch (e) {
                errorEl.textContent = "网络错误";
                errorEl.style.display = "block";
            }
        }

        // 显示主页面
        function showMainPage() {
            document.getElementById("authPage").style.display = "none";
            document.getElementById("mainPage").style.display = "block";
            document.getElementById("mainPage").classList.add("show-sidebar");
            connectWebSocket();
            loadFriends();
        }

        // 连接 WebSocket
        function connectWebSocket() {
            const protocol = location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(protocol + "//" + location.host);

            ws.onopen = function() {
                ws.send(JSON.stringify({ type: "login", userId: currentUser.id }));
            };

            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);

                if (msg.type === "online") {
                    onlineUsers = new Set(msg.users);
                    updateFriendsList();
                    updateChatStatus();
                } else if (msg.type === "chat") {
                    handleIncomingMessage(msg);
                } else if (msg.type === "call-offer" || msg.type === "call-answer" || msg.type === "call-candidate" || msg.type === "call-end") {
                    handleCallSignaling(msg);
                } else if (msg.type === "friend-added") {
                    // 收到好友添加通知，刷新好友列表
                    loadFriends();
                }
            };

            ws.onclose = function() {
                setTimeout(connectWebSocket, 2000);
            };
        }

        // 加载好友列表
        async function loadFriends() {
            try {
                const res = await fetch("/api/friends/" + currentUser.id);
                friends = await res.json();
                updateFriendsList();
            } catch (e) {
                console.error("加载好友失败:", e);
            }
        }

        // 更新好友列表
        function updateFriendsList() {
            const list = document.getElementById("friendsList");
            const search = document.getElementById("searchFriend").value.toLowerCase();

            const filtered = friends.filter(f => f.username.toLowerCase().includes(search));

            list.innerHTML = filtered.map(f => {
                const isOnline = onlineUsers.has(f.id);
                const isActive = currentFriend && currentFriend.id === f.id;
                const avatar = f.avatar || f.username[0].toUpperCase();
                return '<div class="friend-item' + (isActive ? ' active' : '') + '" onclick="selectFriend(' + f.id + ')">' +
                    '<div class="friend-avatar">' + avatar + '</div>' +
                    '<div class="friend-info">' +
                    '<div class="name">' + f.username + '</div>' +
                    '</div>' +
                    '<div class="friend-status ' + (isOnline ? 'online' : 'offline') + '"></div>' +
                    '</div>';
            }).join("");
        }

        // 筛选好友
        function filterFriends() {
            updateFriendsList();
        }

        // 选择好友
        async function selectFriend(friendId) {
            currentFriend = friends.find(f => f.id === friendId);
            if (!currentFriend) return;

            document.getElementById("chatArea").classList.add("active");
            document.getElementById("emptyChat").style.display = "none";
            document.getElementById("chatMessages").style.display = "block";
            document.getElementById("chatInput").style.display = "flex";

            document.getElementById("chatAvatar").textContent = currentFriend.avatar || currentFriend.username[0].toUpperCase();
            document.getElementById("chatName").textContent = currentFriend.username;

            updateChatStatus();
            updateFriendsList();

            // 移动端切换
            document.getElementById("mainPage").classList.remove("show-sidebar");
            document.getElementById("mainPage").classList.add("show-chat");

            await loadMessages();
        }

        // 更新聊天状态
        function updateChatStatus() {
            if (!currentFriend) return;
            const isOnline = onlineUsers.has(currentFriend.id);
            document.getElementById("chatStatus").textContent = isOnline ? "在线" : "离线";
            document.getElementById("chatStatus").className = "status" + (isOnline ? " online" : "");
        }

        // 加载聊天记录
        async function loadMessages() {
            try {
                const res = await fetch("/api/friends/messages/" + currentUser.id + "/" + currentFriend.id);
                const messages = await res.json();
                renderMessages(messages);
            } catch (e) {
                console.error("加载消息失败:", e);
            }
        }

        // 渲染消息
        function renderMessages(messages) {
            const container = document.getElementById("chatMessages");
            let html = '<div class="date-divider"><span>今天</span></div>';

            messages.forEach(msg => {
                const isMine = msg.from_user === currentUser.id;
                const time = new Date(msg.created_at).toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
                html += '<div class="message ' + (isMine ? "mine" : "other") + '">' +
                    '<div class="bubble">' +
                    '<div class="text">' + escapeHtml(msg.content) + '</div>' +
                    '<div class="time">' + time + '</div>' +
                    '</div></div>';
            });

            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        // 处理收到的消息
        function handleIncomingMessage(msg) {
            // 如果当前正在和这个人聊天，直接显示
            if (currentFriend && msg.from === currentFriend.id) {
                const container = document.getElementById("chatMessages");
                const time = new Date(msg.time).toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
                const div = document.createElement("div");
                div.className = "message other";
                div.innerHTML = '<div class="bubble"><div class="text">' + escapeHtml(msg.content) + '</div><div class="time">' + time + '</div></div>';
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }

            // 通知
            if (!document.hasFocus()) {
                playBeep();
            }
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById("msgInput");
            const content = input.value.trim();
            if (!content || !currentFriend) return;

            // 发送给服务器
            ws.send(JSON.stringify({
                type: "chat",
                from: currentUser.id,
                fromName: currentUser.username,
                to: currentFriend.id,
                content: content
            }));

            // 显示在页面
            const container = document.getElementById("chatMessages");
            const time = new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
            const div = document.createElement("div");
            div.className = "message mine";
            div.innerHTML = '<div class="bubble"><div class="text">' + escapeHtml(content) + '</div><div class="time">' + time + '</div></div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;

            input.value = "";
        }

        // 回车发送
        document.addEventListener("keypress", function(e) {
            if (e.key === "Enter" && document.activeElement.id === "msgInput") {
                sendMessage();
            }
            if (e.key === "Enter" && (document.activeElement.id === "authUsername" || document.activeElement.id === "authPassword")) {
                handleAuth();
            }
        });

        // 返回（移动端）
        function goBack() {
            document.getElementById("mainPage").classList.add("show-sidebar");
            document.getElementById("mainPage").classList.remove("show-chat");
        }

        // 显示添加好友弹窗
        function showAddFriend() {
            document.getElementById("addFriendModal").classList.add("show");
            document.getElementById("searchUserInput").value = "";
            document.getElementById("searchResults").innerHTML = "";
            document.getElementById("searchUserInput").focus();
        }

        // 关闭添加好友弹窗
        function closeAddFriend() {
            document.getElementById("addFriendModal").classList.remove("show");
        }

        // 搜索用户
        let searchTimer = null;
        async function searchUsers() {
            const query = document.getElementById("searchUserInput").value.trim();
            if (!query) {
                document.getElementById("searchResults").innerHTML = "";
                return;
            }

            clearTimeout(searchTimer);
            searchTimer = setTimeout(async function() {
                try {
                    const res = await fetch("/api/auth/users?search=" + encodeURIComponent(query));
                    const users = await res.json();

                    const results = users
                        .filter(u => u.id !== currentUser.id)
                        .map(u => {
                            const isFriend = friends.some(f => f.id === u.id);
                            return '<div class="search-result">' +
                                '<span class="name">' + u.username + '</span>' +
                                (isFriend ? '<span style="color:#708499">已是好友</span>' :
                                '<button class="add-btn" onclick="addFriend(' + u.id + ')">添加</button>') +
                                '</div>';
                        }).join("");

                    document.getElementById("searchResults").innerHTML = results || '<div style="color:#708499;padding:10px">未找到用户</div>';
                } catch (e) {
                    console.error("搜索失败:", e);
                }
            }, 300);
        }

        // 添加好友
        async function addFriend(friendId) {
            try {
                const res = await fetch("/api/friends/add", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ userId: currentUser.id, friendId: friendId })
                });
                const data = await res.json();

                if (!res.ok) {
                    alert(data.error);
                    return;
                }

                // 通过 WebSocket 通知对方
                ws.send(JSON.stringify({
                    type: "friend-added",
                    from: currentUser.id,
                    fromName: currentUser.username,
                    to: friendId
                }));

                await loadFriends();
                closeAddFriend();
            } catch (e) {
                alert("添加失败");
            }
        }

        // 播放提示音
        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 800;
                gain.gain.value = 0.3;
                osc.start();
                setTimeout(() => osc.stop(), 200);
            } catch (e) {}
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        // 退出登录
        function logout() {
            localStorage.removeItem("chatUser");
            location.reload();
        }

        // ========== 个人中心 ==========

        let editMode = null; // "username" | "password" | "avatar"

        // 显示个人中心
        async function showProfile() {
            const page = document.getElementById("profilePage");
            page.classList.add("show");

            // 填充用户信息
            const avatar = currentUser.avatar || currentUser.username[0].toUpperCase();
            document.getElementById("profileAvatar").textContent = avatar;
            document.getElementById("profileUsername").textContent = currentUser.username;
            document.getElementById("profileId").textContent = "ID: " + currentUser.id;
            document.getElementById("profileUsernameValue").textContent = currentUser.username;

            // 加载统计数据
            try {
                const res = await authFetch("/api/auth/profile");
                const data = await res.json();
                document.getElementById("statFriends").textContent = data.friendsCount || 0;
                document.getElementById("statMessages").textContent = data.messagesCount || 0;
            } catch (e) {
                console.error("加载统计失败:", e);
            }
        }

        // 关闭个人中心
        function closeProfile() {
            document.getElementById("profilePage").classList.remove("show");
        }

        // 显示修改用户名弹窗
        function showEditUsername() {
            editMode = "username";
            document.getElementById("editTitle").textContent = "修改用户名";
            document.getElementById("editContent").innerHTML =
                '<input type="text" id="editInput" placeholder="新用户名" value="' + escapeHtml(currentUser.username) + '" autocomplete="off">';
            document.getElementById("editError").style.display = "none";
            document.getElementById("editModal").classList.add("show");
            document.getElementById("editInput").focus();
        }

        // 显示修改密码弹窗
        function showEditPassword() {
            editMode = "password";
            document.getElementById("editTitle").textContent = "修改密码";
            document.getElementById("editContent").innerHTML =
                '<input type="password" id="editOldPwd" placeholder="当前密码">' +
                '<input type="password" id="editNewPwd" placeholder="新密码（至少6位）">';
            document.getElementById("editError").style.display = "none";
            document.getElementById("editModal").classList.add("show");
            document.getElementById("editOldPwd").focus();
        }

        // 显示修改头像弹窗
        function showEditAvatar() {
            editMode = "avatar";
            const emojis = ["😀","😎","🤩","🥳","🦊","🐱","🐶","🐼","🐨","🦁","🐯","🐸","🐵","👻","🤖","👽","🦸","🧙","👨‍💻","👩‍💻","🎵","🎮","⚽","🏀","🌟","🔥","💎","🎯","🚀","🌈"];
            const current = currentUser.avatar || "";
            let html = '<div class="emoji-picker">';
            emojis.forEach(function(e) {
                html += '<div class="emoji-option' + (current === e ? ' selected' : '') + '" onclick="selectAvatarEmoji(this,\'' + e + '\')">' + e + '</div>';
            });
            html += '</div>';
            document.getElementById("editTitle").textContent = "选择头像";
            document.getElementById("editContent").innerHTML = html;
            document.getElementById("editError").style.display = "none";
            document.getElementById("editModal").classList.add("show");
        }

        let selectedAvatar = null;

        function selectAvatarEmoji(el, emoji) {
            document.querySelectorAll(".emoji-option").forEach(function(o) { o.classList.remove("selected"); });
            el.classList.add("selected");
            selectedAvatar = emoji;
        }

        // 关闭编辑弹窗
        function closeEditModal() {
            document.getElementById("editModal").classList.remove("show");
            editMode = null;
            selectedAvatar = null;
        }

        // 保存编辑
        async function saveEdit() {
            const errorEl = document.getElementById("editError");

            if (editMode === "username") {
                const newUsername = document.getElementById("editInput").value.trim();
                if (!newUsername || newUsername.length < 2 || newUsername.length > 20) {
                    errorEl.textContent = "用户名长度 2-20 个字符";
                    errorEl.style.display = "block";
                    return;
                }
                try {
                    const res = await authFetch("/api/auth/update-username", {
                        method: "POST",
                        body: { username: newUsername }
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        errorEl.textContent = data.error;
                        errorEl.style.display = "block";
                        return;
                    }
                    currentUser.username = newUsername;
                    localStorage.setItem("chatUser", JSON.stringify(currentUser));
                    closeEditModal();
                    showProfile();
                    updateFriendsList();
                } catch (e) {
                    errorEl.textContent = "网络错误";
                    errorEl.style.display = "block";
                }

            } else if (editMode === "password") {
                const oldPwd = document.getElementById("editOldPwd").value;
                const newPwd = document.getElementById("editNewPwd").value;
                if (!oldPwd || !newPwd) {
                    errorEl.textContent = "请填写完整";
                    errorEl.style.display = "block";
                    return;
                }
                if (newPwd.length < 6) {
                    errorEl.textContent = "新密码至少 6 位";
                    errorEl.style.display = "block";
                    return;
                }
                try {
                    const res = await authFetch("/api/auth/update-password", {
                        method: "POST",
                        body: { oldPassword: oldPwd, newPassword: newPwd }
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        errorEl.textContent = data.error;
                        errorEl.style.display = "block";
                        return;
                    }
                    closeEditModal();
                    alert("密码修改成功");
                } catch (e) {
                    errorEl.textContent = "网络错误";
                    errorEl.style.display = "block";
                }

            } else if (editMode === "avatar") {
                if (!selectedAvatar) {
                    closeEditModal();
                    return;
                }
                try {
                    const res = await authFetch("/api/auth/update-avatar", {
                        method: "POST",
                        body: { avatar: selectedAvatar }
                    });
                    if (res.ok) {
                        currentUser.avatar = selectedAvatar;
                        localStorage.setItem("chatUser", JSON.stringify(currentUser));
                        closeEditModal();
                        showProfile();
                    }
                } catch (e) {
                    errorEl.textContent = "网络错误";
                    errorEl.style.display = "block";
                }
            }
        }

        // ========== 语音通话 ==========

        let peerConnection = null;
        let localStream = null;
        let callTimer = null;
        let callSeconds = 0;
        let isMuted = false;
        let isVideoOff = false;
        let isInCall = false;
        let isVideoCall = false;
        let callTarget = null;

        // ICE 服务器配置（免费的 STUN 服务器）
        const rtcConfig = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" }
            ]
        };

        // 发起通话
        async function startCall(withVideo) {
            if (!currentFriend || isInCall) return;

            callTarget = currentFriend;
            isVideoCall = withVideo;
            showCallUI("正在呼叫...");

            try {
                // 获取麦克风（和摄像头）权限
                const constraints = withVideo
                    ? { audio: true, video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } }
                    : { audio: true };
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                setupPeerConnection();

                // 显示本地预览
                if (withVideo) {
                    const localVideo = document.getElementById("localVideo");
                    localVideo.srcObject = localStream;
                    document.getElementById("callOverlay").classList.add("video-mode");
                }

                // 创建 offer
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                // 发送 offer 给对方
                ws.send(JSON.stringify({
                    type: "call-offer",
                    from: currentUser.id,
                    fromName: currentUser.username,
                    fromAvatar: currentUser.avatar || "",
                    to: callTarget.id,
                    offer: offer,
                    video: withVideo
                }));
            } catch (e) {
                console.error("呼叫失败:", e);
                endCall();
                alert(withVideo ? "无法访问摄像头/麦克风，请检查权限" : "无法访问麦克风，请检查权限");
            }
        }

        // 设置 WebRTC 连接
        function setupPeerConnection() {
            peerConnection = new RTCPeerConnection(rtcConfig);

            // 添加本地音频流
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }

            // 收到远程流
            peerConnection.ontrack = function(event) {
                console.log("收到远程流, track kind:", event.track.kind, "isVideoCall:", isVideoCall);
                if (isVideoCall) {
                    // 视频模式：remoteVideo 同时处理音频和视频
                    const remoteVideo = document.getElementById("remoteVideo");
                    if (!remoteVideo.srcObject) {
                        remoteVideo.srcObject = event.streams[0];
                        remoteVideo.play().catch(function(e) {
                            console.log("视频自动播放失败，等待用户交互");
                            document.addEventListener("click", function playVideo() {
                                remoteVideo.play().catch(function() {});
                                document.removeEventListener("click", playVideo);
                            }, { once: true });
                        });
                    }
                } else if (event.track.kind === "audio") {
                    // 语音模式：创建独立 audio 元素
                    let audio = document.getElementById("remoteAudio");
                    if (!audio) {
                        audio = document.createElement("audio");
                        audio.id = "remoteAudio";
                        audio.autoplay = true;
                        audio.playsInline = true;
                        document.body.appendChild(audio);
                    }
                    if (!audio.srcObject) {
                        audio.srcObject = event.streams[0];
                    }
                    audio.play().catch(function(e) {
                        console.log("自动播放失败，等待用户交互");
                        document.addEventListener("click", function playAudio() {
                            audio.play().catch(function() {});
                            document.removeEventListener("click", playAudio);
                        }, { once: true });
                    });
                }
            };

            // 连接状态变化
            peerConnection.onconnectionstatechange = function() {
                console.log("连接状态:", peerConnection.connectionState);
                if (peerConnection.connectionState === "connected") {
                    document.getElementById("callStatus").textContent = "通话中";
                    startCallTimer();
                    // 连接建立后，确保媒体播放
                    if (isVideoCall) {
                        const remoteVideo = document.getElementById("remoteVideo");
                        if (remoteVideo && remoteVideo.srcObject) {
                            remoteVideo.play().catch(function() {});
                        }
                    } else {
                        const audio = document.getElementById("remoteAudio");
                        if (audio && audio.srcObject) {
                            audio.play().catch(function() {});
                        }
                    }
                } else if (peerConnection.connectionState === "failed" || peerConnection.connectionState === "disconnected") {
                    console.log("连接失败或断开");
                    endCall();
                }
            };

            // ICE 候选
            peerConnection.onicecandidate = function(event) {
                if (event.candidate) {
                    ws.send(JSON.stringify({
                        type: "call-candidate",
                        from: currentUser.id,
                        to: callTarget.id,
                        candidate: event.candidate
                    }));
                }
            };
        }

        // 显示通话界面
        function showCallUI(status) {
            isInCall = true;
            const overlay = document.getElementById("callOverlay");
            overlay.classList.add("show");
            if (isVideoCall) {
                overlay.classList.add("video-mode");
            } else {
                overlay.classList.remove("video-mode");
            }
            document.getElementById("callAvatar").textContent = (callTarget.avatar || callTarget.username[0].toUpperCase());
            document.getElementById("callName").textContent = callTarget.username;
            document.getElementById("callStatus").textContent = status;
            document.getElementById("callTimer").style.display = "none";
            document.getElementById("acceptBtn").style.display = "none";
            document.getElementById("rejectBtn").style.display = "flex";
            document.getElementById("muteBtn").style.display = "flex";
            document.getElementById("videoBtn").style.display = isVideoCall ? "flex" : "none";
            document.getElementById("speakerBtn").style.display = "flex";
        }

        // 显示来电界面
        function showIncomingCallUI(callerName, hasVideo) {
            isInCall = true;
            isVideoCall = hasVideo;
            const overlay = document.getElementById("callOverlay");
            overlay.classList.add("show");
            if (hasVideo) {
                overlay.classList.add("video-mode");
            } else {
                overlay.classList.remove("video-mode");
            }
            document.getElementById("callAvatar").textContent = (callTarget.avatar || callerName[0].toUpperCase());
            document.getElementById("callName").textContent = callerName;
            document.getElementById("callStatus").textContent = hasVideo ? "视频来电..." : "来电...";
            document.getElementById("callTimer").style.display = "none";
            document.getElementById("acceptBtn").style.display = "flex";
            document.getElementById("rejectBtn").style.display = "flex";
            document.getElementById("muteBtn").style.display = "none";
            document.getElementById("videoBtn").style.display = "none";
            document.getElementById("speakerBtn").style.display = "none";

            // 播放来电铃声
            playRingtone();
        }

        // 接听电话
        async function acceptCall() {
            try {
                console.log("开始接听电话, isVideoCall:", isVideoCall);
                const constraints = isVideoCall
                    ? { audio: true, video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } }
                    : { audio: true };
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                console.log("获取媒体成功");

                // 显示本地预览
                if (isVideoCall) {
                    const localVideo = document.getElementById("localVideo");
                    localVideo.srcObject = localStream;
                    document.getElementById("callOverlay").classList.add("video-mode");
                }

                setupPeerConnection();

                // 设置远程 offer
                await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOffer));
                console.log("设置远程描述成功");

                // 创建 answer
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                console.log("创建 answer 成功");

                // 发送 answer 给对方
                ws.send(JSON.stringify({
                    type: "call-answer",
                    from: currentUser.id,
                    to: callTarget.id,
                    answer: answer
                }));

                // 添加之前缓存的 ICE 候选
                for (const candidate of pendingCandidates) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                }
                pendingCandidates = [];

                document.getElementById("callStatus").textContent = "正在连接...";
                document.getElementById("acceptBtn").style.display = "none";
                document.getElementById("muteBtn").style.display = "flex";
                document.getElementById("videoBtn").style.display = isVideoCall ? "flex" : "none";
                document.getElementById("speakerBtn").style.display = "flex";
                console.log("接听完成，等待连接建立");
            } catch (e) {
                console.error("接听失败:", e);
                endCall();
            }
        }

        let incomingOffer = null;
        let pendingCandidates = []; // 缓存 ICE 候选

        // 结束通话
        function endCall() {
            // 发送挂断信号
            if (callTarget) {
                ws.send(JSON.stringify({
                    type: "call-end",
                    from: currentUser.id,
                    to: callTarget.id
                }));
            }

            // 关闭 WebRTC 连接
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }

            // 停止媒体流
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            // 清理视频元素
            const remoteVideo = document.getElementById("remoteVideo");
            if (remoteVideo) remoteVideo.srcObject = null;
            const localVideo = document.getElementById("localVideo");
            if (localVideo) {
                localVideo.srcObject = null;
                localVideo.style.opacity = "1";
            }

            // 移除远程音频
            const remoteAudio = document.getElementById("remoteAudio");
            if (remoteAudio) remoteAudio.remove();

            // 停止计时器
            if (callTimer) {
                clearInterval(callTimer);
                callTimer = null;
            }

            // 重置按钮状态
            document.getElementById("muteBtn").textContent = "🎤";
            document.getElementById("muteBtn").classList.remove("active");
            document.getElementById("videoBtn").innerHTML = "📹";
            document.getElementById("videoBtn").classList.remove("active");

            // 隐藏通话界面
            const overlay = document.getElementById("callOverlay");
            overlay.classList.remove("show");
            overlay.classList.remove("video-mode");
            isInCall = false;
            isVideoCall = false;
            isVideoOff = false;
            callTarget = null;
            callSeconds = 0;
            isMuted = false;
            incomingOffer = null;
            pendingCandidates = [];
        }

        // 开始计时
        function startCallTimer() {
            // 先清除旧的计时器
            if (callTimer) {
                clearInterval(callTimer);
                callTimer = null;
            }
            callSeconds = 0;
            const timerEl = document.getElementById("callTimer");
            timerEl.style.display = "block";
            timerEl.textContent = "00:00";
            callTimer = setInterval(function() {
                callSeconds++;
                const mins = Math.floor(callSeconds / 60).toString().padStart(2, "0");
                const secs = (callSeconds % 60).toString().padStart(2, "0");
                timerEl.textContent = mins + ":" + secs;
            }, 1000);
        }

        // 切换静音
        function toggleMute() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(track => track.enabled = !isMuted);
            document.getElementById("muteBtn").classList.toggle("active", isMuted);
            document.getElementById("muteBtn").textContent = isMuted ? "🔇" : "🎤";
        }

        // 切换扬声器（移动端）
        function toggleSpeaker() {
            const btn = document.getElementById("speakerBtn");
            btn.classList.toggle("active");
        }

        // 切换摄像头
        function toggleVideo() {
            if (!localStream) return;
            const videoTracks = localStream.getVideoTracks();
            if (videoTracks.length === 0) return;

            isVideoOff = !isVideoOff;
            videoTracks.forEach(track => track.enabled = !isVideoOff);
            const btn = document.getElementById("videoBtn");
            btn.classList.toggle("active", isVideoOff);
            btn.innerHTML = isVideoOff
                ? '<span style="text-decoration:line-through">📹</span>'
                : '📹';

            // 本地预览
            const localVideo = document.getElementById("localVideo");
            if (isVideoOff) {
                localVideo.style.opacity = "0.2";
            } else {
                localVideo.style.opacity = "1";
            }
        }

        // 播放来电铃声
        function playRingtone() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                let count = 0;
                const interval = setInterval(function() {
                    if (count >= 6 || !isInCall) {
                        clearInterval(interval);
                        return;
                    }
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = count % 2 === 0 ? 440 : 480;
                    gain.gain.value = 0.2;
                    osc.start();
                    setTimeout(() => osc.stop(), 200);
                    count++;
                }, 300);
            } catch (e) {}
        }

        // 处理通话信令
        function handleCallSignaling(msg) {
            if (msg.type === "call-offer") {
                // 收到来电
                callTarget = { id: msg.from, username: msg.fromName, avatar: msg.fromAvatar || "" };
                incomingOffer = msg.offer;
                showIncomingCallUI(msg.fromName, msg.video === true);

            } else if (msg.type === "call-answer") {
                // 对方接听
                console.log("收到对方接听");
                peerConnection.setRemoteDescription(new RTCSessionDescription(msg.answer));
                document.getElementById("callStatus").textContent = "正在连接...";

            } else if (msg.type === "call-candidate") {
                // 收到 ICE 候选
                if (peerConnection && peerConnection.remoteDescription) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(msg.candidate));
                } else {
                    // 缓存候选，等 peerConnection 就绪后再添加
                    pendingCandidates.push(msg.candidate);
                }

            } else if (msg.type === "call-end") {
                // 对方挂断
                endCall();
            }
        }

        init();
    </script>
</body>
</html>
